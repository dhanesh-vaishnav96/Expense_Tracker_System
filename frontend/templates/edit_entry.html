{% extends "base.html" %}

{% block title %}Expense Tracker - Edit Entry{% endblock %}

{% block content %}
<header class="page-header">
    <h1 style="color: var(--primary-color);">Edit Expense</h1>
    <div class="page-header-actions">
        <a href="/entries" class="btn btn-secondary">Back to Entries</a>
    </div>
</header>

<div class="ag-card ag-hover edit-card" style="max-width: 600px; margin: 0 auto;">
    <h2 style="margin-bottom: 20px;">Update Expense Details</h2>
    <form action="/api/expenses-edit-form/{{ expense.id }}" method="POST" style="display: grid; gap: 15px;">
        <div>
            <label style="color: var(--text-secondary); display: block; margin-bottom: 5px;">Amount</label>
            <input type="number" name="amount" class="form-control" value="{{ expense.amount }}" required step="0.01">
        </div>
        <div>
            <label style="color: var(--text-secondary); display: block; margin-bottom: 5px;">Category</label>
            <select name="category_id" class="form-control" required>
                <option value="" disabled {% if not expense.category_id %}selected{% endif %}>Select Category</option>
                {% for cat in categories %}
                {% if cat.type == 'expense' %}
                <option value="{{ cat.id }}" {% if cat.id == expense.category_id %}selected{% endif %}>{{ cat.name }}</option>
                {% endif %}
                {% endfor %}
            </select>
        </div>
        <div>
            <label style="color: var(--text-secondary); display: block; margin-bottom: 5px;">Date</label>
            <input type="date" name="date" class="form-control" value="{{ expense.date.strftime('%Y-%m-%d') }}" required>
        </div>
        <div>
            <label style="color: var(--text-secondary); display: block; margin-bottom: 5px;">Note</label>
            <input type="text" name="note" class="form-control" value="{{ expense.note or '' }}">
        </div>
        <button type="submit" class="btn btn-primary" style="margin-top: 10px;">Save Changes</button>
    </form>
</div>
{% endblock %}
